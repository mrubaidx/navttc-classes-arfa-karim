   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pH Scale</title>

    <style>
        body {
            background-color: silver;
            color: white;
            padding: 20px;
            font-family: Arial, Verdana, sans-serif;
        }

        h1 {
            background: rgba(255, 255, 255, 0.5);
            color: #64645A;
            padding: 10px;
        }

        p {
            padding: 8px;
            margin: 0;
            font-weight: bold;
        }

        .zero      { background: rgb(238,62,128); }
        .one       { background: rgb(244,90,139); }
        .two       { background: rgb(243,106,152); }
        .three     { background: rgb(244,123,166); }
        .four      { background: rgb(245,140,178); }
        .five      { background: rgb(246,159,192); }
        .six       { background: rgb(245,176,204); }
        .seven     { background: rgb(0,187,136); }
        .eight     { background: rgb(140,202,242); }
        .nine      { background: rgb(114,193,240); }
        .ten       { background: rgb(84,182,237); }
        .eleven    { background: rgb(48,170,233); }
        .twelve    { background: rgb(0,160,230); }
        .thirteen  { background: rgb(0,149,226); }
        .fourteen  { background: rgb(0,136,221); }
    </style>
</head>

<body>

    <h1>pH Scale</h1>

    <p class="fourteen">14.0 VERY ALKALINE</p>
    <p class="thirteen">13.0</p>
    <p class="twelve">12.0</p>
    <p class="eleven">11.0</p>
    <p class="ten">10.0</p>
    <p class="nine">9.0</p>
    <p class="eight">8.0</p>
    <p class="seven">7.0 NEUTRAL</p>
    <p class="six">6.0</p>
    <p class="five">5.0</p>
    <p class="four">4.0</p>
    <p class="three">3.0</p>
    <p class="two">2.0</p>
    <p class="one">1.0</p>
    <p class="zero">0.0 VERY ACID</p>

</body>
</html>




</body>
